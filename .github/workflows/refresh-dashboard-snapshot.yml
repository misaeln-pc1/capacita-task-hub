name: Refresh dashboard snapshot

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: atlas-dashboard-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    name: Regenerate, validate and open draft PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Regenerate and validate snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node dashboard/predeploy.mjs
          node --test dashboard/tests/*.test.mjs
          git diff --check

      - name: Commit snapshot to a new branch
        id: snapshot
        shell: bash
        run: |
          set -euo pipefail
          branch="automation/dashboard-snapshot-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add dashboard/snapshot.json dashboard/snapshot.js

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes to propose."
            exit 0
          fi

          git commit -m "chore: refresh dashboard snapshot"
          git push origin "$branch"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open draft pull request
        if: steps.snapshot.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SNAPSHOT_BRANCH: ${{ steps.snapshot.outputs.branch }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base "$DEFAULT_BRANCH" \
            --head "$SNAPSHOT_BRANCH" \
            --draft \
            --title "chore: refresh dashboard snapshot" \
            --body $'Generated by the manual **Refresh dashboard snapshot** workflow.\n\nRelates #35\nRelates #31\n\n- Regenerated from current open GitHub Issues.\n- Validated before commit.\n- Review required before merge.\n- Does not deploy ChatGPT Sites.'